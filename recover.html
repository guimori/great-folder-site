<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar licença | Great Folder</title>
  <meta name="description" content="Recupere sua licença do Great Folder pelo email da compra.">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="styles.css">
  <script src="site-config.js"></script>
  <script src="recover.js" defer></script>
</head>
<body>
  <main class="redeem-page">
    <section class="redeem-shell">
      <div class="redeem-header">
        <p class="eyebrow" data-i18n="recover_eyebrow">Recuperação</p>
        <h1 data-i18n="recover_title">Recupere sua licença</h1>
        <p class="section-copy" data-i18n="recover_copy">
          Digite o email usado na compra. Se existir uma licença vinculada a ele, nós enviaremos agora.
        </p>
      </div>

      <div class="recover-card">
        <form id="recover-form" class="recover-form">
          <label class="recover-field">
            <span class="recover-label" data-i18n="recover_email_label">Email da compra</span>
            <input id="recover-email" class="recover-input" type="email" autocomplete="email" required placeholder="voce@exemplo.com">
          </label>
          <button id="recover-submit" class="button button-primary recover-submit" type="submit" data-i18n="recover_submit">Enviar licença por email</button>
        </form>
        <p id="recover-feedback" class="download-note" data-i18n="recover_hint">
          Use o mesmo email cadastrado na Kiwify.
        </p>
      </div>
    </section>
  </main>

  <div class="locale-switcher" aria-label="Language selector">
    <button class="locale-button" type="button" data-locale-button="pt-BR">
      <span class="locale-flag" aria-hidden="true">BR</span>
    </button>
    <span class="locale-separator">&gt;</span>
    <button class="locale-button" type="button" data-locale-button="en-US">
      <span class="locale-flag" aria-hidden="true">US</span>
    </button>
  </div>
</body>
</html>
